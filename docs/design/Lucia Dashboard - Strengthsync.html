<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucia — Panel de entrenamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--leg-color:oklch(70% 0.14 220)}
body{background:#0a0a0a;font-family:'Inter',sans-serif;color:oklch(92% 0.01 80);min-height:100vh}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(oklch(100% 0 0/0.03) 1px,transparent 1px),linear-gradient(90deg,oklch(100% 0 0/0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.glow{position:fixed;top:-200px;left:-150px;width:700px;height:700px;background:radial-gradient(ellipse at center,oklch(82% 0.18 88/0.10) 0%,transparent 70%);pointer-events:none}
.wrap{max-width:1100px;margin:0 auto;padding:56px 40px 100px;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;gap:20px;flex-wrap:wrap}
.who{display:flex;align-items:center;gap:16px}
.avatar{width:56px;height:56px;border-radius:50%;background:oklch(82% 0.18 88/0.15);border:1.5px solid oklch(82% 0.18 88/0.4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:oklch(82% 0.18 88);flex-shrink:0}
.who h1{font-size:26px;font-weight:800;letter-spacing:-0.02em;margin-bottom:3px}
.who p{font-size:14px;color:oklch(58% 0 0)}
.stat-pills{display:flex;gap:10px}
.pill{background:oklch(100% 0 0/0.05);border:1px solid oklch(100% 0 0/0.10);border-radius:100px;padding:8px 16px;font-size:12px;font-weight:600;color:oklch(62% 0 0);letter-spacing:0.02em}
.pill b{color:oklch(90% 0.01 80);font-weight:800}
section{margin-bottom:44px}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-title h2{font-size:19px;font-weight:800;letter-spacing:-0.01em}
.sec-title span{font-size:13px;color:oklch(52% 0 0)}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.day-slot{background:oklch(14% 0 0);border:1px solid oklch(100% 0 0/0.09);border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:150px;transition:border-color .15s}
.day-slot.training{background:oklch(20% 0.02 88);border-color:oklch(82% 0.18 88/0.22)}
.day-label{font-size:11px;font-weight:700;letter-spacing:0.08em;color:oklch(50% 0 0);text-transform:uppercase}
.day-slot.today{border-color:oklch(82% 0.18 88/0.5);box-shadow:0 0 0 1px oklch(82% 0.18 88/0.25),0 0 20px oklch(82% 0.18 88/0.15)}\n.day-slot.today .day-label{color:oklch(82% 0.18 88)}
.day-badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:0.03em;white-space:nowrap}
.day-badge.upper{background:oklch(82% 0.18 88/0.18);color:oklch(82% 0.18 88)}
.day-badge.leg{background:color-mix(in oklch,var(--leg-color) 20%,transparent);color:var(--leg-color)}
.day-badge.rest{background:oklch(100% 0 0/0.06);color:oklch(45% 0 0)}
.day-count{font-size:11px;color:oklch(45% 0 0)}
.move-btns{display:flex;gap:4px;margin-top:auto}
.move-btn{width:24px;height:24px;border-radius:7px;background:oklch(100% 0 0/0.06);border:1px solid oklch(100% 0 0/0.10);color:oklch(65% 0 0);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.move-btn:hover:not(:disabled){background:oklch(82% 0.18 88/0.15);border-color:oklch(82% 0.18 88/0.4);color:oklch(82% 0.18 88)}
.move-btn:disabled{opacity:0.25;cursor:not-allowed}
.move-btn svg{width:12px;height:12px}
.program-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:20px;flex-wrap:wrap}
.program-head h2{font-size:24px;font-weight:900;letter-spacing:-0.02em}
.program-head h2 em{font-style:normal;color:oklch(82% 0.18 88)}
.progress-wrap{flex:1;min-width:200px;max-width:340px}
.progress-bar{height:8px;border-radius:100px;background:oklch(100% 0 0/0.08);overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:oklch(82% 0.18 88);border-radius:100px}
.progress-wrap span{font-size:12px;color:oklch(50% 0 0);font-weight:600}
.day-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:820px){.day-grid{grid-template-columns:1fr}.week-row{grid-template-columns:repeat(4,1fr)}}
.excard{background:oklch(14% 0 0);border:1px solid oklch(100% 0 0/0.10);border-radius:16px;padding:20px 22px;display:flex;flex-direction:column}
.excard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.excard-head .type{display:flex;align-items:center;gap:10px}
.day-num{font-size:12px;font-weight:700;color:oklch(45% 0 0)}
.copy-btn{display:flex;align-items:center;gap:6px;background:oklch(100% 0 0/0.06);border:1px solid oklch(100% 0 0/0.12);border-radius:9px;padding:6px 12px;font-size:12px;font-weight:600;color:oklch(65% 0 0);cursor:pointer;transition:.15s}
.copy-btn:hover{background:oklch(82% 0.18 88/0.15);border-color:oklch(82% 0.18 88/0.4);color:oklch(82% 0.18 88)}
.copy-btn svg{width:13px;height:13px}
.copy-btn.copied{background:oklch(75% 0.18 145/0.15);border-color:oklch(75% 0.18 145/0.4);color:oklch(75% 0.18 145)}
.routine{display:flex;flex-direction:column;gap:0}
.rt-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid oklch(100% 0 0/0.06)}
.rt-row:first-child{border-top:none}
.rt-idx{font-size:11px;font-weight:700;color:oklch(38% 0 0);width:16px;flex-shrink:0}
.rt-name{font-size:13.5px;font-weight:600;color:oklch(85% 0.01 80);flex:1;letter-spacing:0.01em}
.rt-meta{font-size:12px;font-weight:700;color:oklch(58% 0 0);white-space:nowrap}
.rt-note{font-size:10.5px;font-weight:700;color:oklch(82% 0.18 88);background:oklch(82% 0.18 88/0.12);padding:2px 7px;border-radius:100px;white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:oklch(18% 0 0);border:1px solid oklch(100% 0 0/0.12);border-radius:12px;padding:12px 22px;font-size:13px;font-weight:600;color:oklch(90% 0.01 80);opacity:0;transition:.25s;pointer-events:none;z-index:10}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="wrap">
  <div class="header">
    <div class="who">
      <div class="avatar">L</div>
      <div>
        <h1>Hola, Lucia</h1>
        <p>Semana 3 de 6 · Plan de fuerza</p>
      </div>
    </div>
    <div class="stat-pills">
      <div class="pill"><b id="statTrain">4</b> días de entreno</div>
      <div class="pill"><b id="statRest">3</b> días de descanso</div>
    </div>
  </div>

  <section>
    <div class="sec-title"><h2>Distribución semanal</h2><span>Reordena tu semana con las flechas</span></div>
    <div class="week-row" id="weekRow"></div>
  </section>

  <section>
    <div class="program-head">
      <h2>Semana <em id="curWeek">3</em>/<span id="totWeek">6</span></h2>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        <span id="progLabel"></span>
      </div>
    </div>
    <div class="day-grid" id="dayGrid"></div>
  </section>
</div>
<div class="toast" id="toast">Copiado al portapapeles</div>
<div id="tweaks-root"></div>
<script type="text/babel">
const LEG_COLORS=['oklch(70% 0.14 220)','oklch(68% 0.16 165)','oklch(68% 0.18 300)','oklch(68% 0.19 20)','oklch(96% 0 0)'];
function TweaksApp(){
  const [t,setTweak]=useTweaks({legColor:LEG_COLORS[4]});
  React.useEffect(()=>{document.documentElement.style.setProperty('--leg-color',t.legColor)},[t.legColor]);
  return (<TweaksPanel><TweakSection label="Colores"/><TweakColor label="Acento Pierna" value={t.legColor} options={LEG_COLORS} onChange={v=>setTweak('legColor',v)}/></TweaksPanel>);
}
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp/>);
</script>
<script>
const data = {
  current_week: 3, total_weeks: 6, training_days_per_week: 4, rest_days_per_week: 3,
  program: [
    {id:1,type:"upper body",routine:[
      {name:"PRES BANCA PLANO",series:4,reps:8,rest_time:90},
      {name:"JALÓN AL PECHO",series:4,reps:12,rest_time:90},
      {name:"REMO GIRONDA",series:3,reps:12,rest_time:90},
      {name:"PRES HOMBRO BARRA BAJA",series:3,reps:10,rest_time:90},
      {name:"CURL DE BICEPS",series:3,reps:12,rest_time:90},
      {name:"EXTENSIÓN TRICEPS POLEA",series:3,reps:12,rest_time:90},
      {name:"FLEXIONES",series:3,reps:8,rest_time:90}
    ]},
    {id:2,type:"leg day",routine:[
      {name:"SENTADILLA FRONTAL",series:3,reps:10,rest_time:90},
      {name:"PESO MUERTO",series:4,reps:10,rest_time:90},
      {name:"ZANCADAS",series:4,reps:15,rest_time:90},
      {name:"HIPEREXTENSIÓN",series:3,reps:12,rest_time:90},
      {name:"EXTENSIÓN CUÁDRICEPS",series:3,reps:12,rest_time:90},
      {name:"LEG CURL",series:3,reps:12,rest_time:90}
    ]},
    {id:3,type:"upper body",routine:[
      {name:"DOMINADAS",series:4,reps:6,rest_time:90,notes:"CON GOMA"},
      {name:"REMO 45",series:4,reps:10,rest_time:90},
      {name:"ELEVACIÓN LATERAL",series:3,reps:8,rest_time:90},
      {name:"DOMINADAS BARRA BAJA",series:3,reps:8,rest_time:90},
      {name:"EXTENSIÓN TRICEPS TRAS NUCA",series:3,reps:12,rest_time:90},
      {name:"FACE PULL",series:3,reps:12,rest_time:90}
    ]},
    {id:4,type:"leg day",routine:[
      {name:"SENTADILLA",series:4,reps:10,rest_time:90},
      {name:"PESO MUERTO",series:4,reps:10,rest_time:90},
      {name:"SUMO",series:3,reps:8,rest_time:90},
      {name:"HIPTHRUST",series:3,reps:10,rest_time:90},
      {name:"PATADA DE GLÚTEO",series:3,reps:10,rest_time:90},
      {name:"STEP UP",series:3,reps:8,rest_time:90},
      {name:"EXTENSIÓN DE CUÁDRICEPS",series:3,reps:12,rest_time:90}
    ]}
  ]
};

const dayLabels = ["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];
let week = [data.program[0], data.program[1], null, data.program[2], data.program[3], null, null];

document.getElementById('statTrain').textContent = data.training_days_per_week;
document.getElementById('statRest').textContent = data.rest_days_per_week;
document.getElementById('curWeek').textContent = data.current_week;
document.getElementById('totWeek').textContent = data.total_weeks;
const pct = Math.round(data.current_week/data.total_weeks*100);
document.getElementById('progFill').style.width = pct+'%';
document.getElementById('progLabel').textContent = pct+'% completado';

const arrowLeft = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>';
const arrowRight = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>';
const copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';

function typeBadgeClass(type){ return type==='upper body' ? 'upper' : 'leg'; }
function typeLabel(type){ return type==='upper body' ? 'Tren superior' : 'Pierna'; }

function renderWeek(){
  const todayIdx = (new Date().getDay()+6)%7;
  const row = document.getElementById('weekRow');
  row.innerHTML = week.map((session,i)=>{
    const isTraining = !!session;
    const isToday = i===todayIdx;
    return `<div class="day-slot ${isTraining?'training':''} ${isToday?'today':''}">
      <div class="day-label">${dayLabels[i]}</div>
      ${isTraining ? `<div class="day-badge ${typeBadgeClass(session.type)}">${typeLabel(session.type)}</div><div class="day-count">${session.routine.length} ejercicios</div>` : `<div class="day-badge rest">Descanso</div>`}
      <div class="move-btns">
        <button class="move-btn" data-i="${i}" data-dir="-1" ${i===0?'disabled':''}>${arrowLeft}</button>
        <button class="move-btn" data-i="${i}" data-dir="1" ${i===week.length-1?'disabled':''}>${arrowRight}</button>
      </div>
    </div>`;
  }).join('');
  row.querySelectorAll('.move-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i = parseInt(btn.dataset.i), dir = parseInt(btn.dataset.dir);
      const j = i+dir;
      if(j<0||j>=week.length) return;
      [week[i],week[j]] = [week[j],week[i]];
      renderWeek();
    });
  });
}

function formatDayText(session){
  const lines = [`${typeLabel(session.type).toUpperCase()} — DÍA ${session.id}`,''];
  session.routine.forEach((ex,idx)=>{
    let line = `${idx+1}. ${ex.name} — ${ex.series}x${ex.reps} (descanso ${ex.rest_time}s)`;
    if(ex.notes) line += ` [${ex.notes}]`;
    lines.push(line);
  });
  return lines.join('\n');
}

function showToast(){
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'),1800);
}

function renderProgram(){
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = data.program.map(session=>{
    const rows = session.routine.map((ex,idx)=>`<div class="rt-row">
      <div class="rt-idx">${idx+1}</div>
      <div class="rt-name">${ex.name}</div>
      ${ex.notes?`<div class="rt-note">${ex.notes}</div>`:''}
      <div class="rt-meta">${ex.series}×${ex.reps} · ${ex.rest_time}s</div>
    </div>`).join('');
    return `<div class="excard">
      <div class="excard-head">
        <div class="type">
          <div class="day-badge ${typeBadgeClass(session.type)}">${typeLabel(session.type)}</div>
          <span class="day-num">Día ${session.id}</span>
        </div>
        <button class="copy-btn" data-id="${session.id}">${copyIcon}<span>Copiar</span></button>
      </div>
      <div class="routine">${rows}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const session = data.program.find(s=>s.id==btn.dataset.id);
      const text = formatDayText(session);
      try{ await navigator.clipboard.writeText(text); }catch(e){}
      btn.classList.add('copied');
      btn.querySelector('span').textContent = 'Copiado';
      showToast();
      setTimeout(()=>{btn.classList.remove('copied');btn.querySelector('span').textContent='Copiar';},1600);
    });
  });
}

renderWeek();
renderProgram();
</script>
</body>
</html>
